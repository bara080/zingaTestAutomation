name: tests

on:
  # Fired by Zinga repo on PR — payload includes the head SHA to pin the submodule.
  repository_dispatch:
    types: [zinga-pr]
  # Also run on zingaTest's own PRs (so QA changes are gated too).
  pull_request:
    branches: [main]
  # Nightly full run on whatever Zinga commit the submodule points at.
  schedule:
    - cron: '0 6 * * *'
  # Manual "Run workflow" button in the Actions UI — for ad-hoc verification.
  workflow_dispatch:

jobs:
  unit-component-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.ZINGA_DEPLOY_KEY }}

      - name: Pin Zinga submodule to PR head SHA
        if: github.event_name == 'repository_dispatch'
        run: |
          cd zinga
          git fetch origin ${{ github.event.client_payload.zinga_sha }}
          git checkout ${{ github.event.client_payload.zinga_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install zingaTest deps
        run: npm install --no-fund --no-audit

      - name: Install Zinga app deps (needed for component tests)
        working-directory: zinga/Frontend
        run: npm install --no-fund --no-audit

      - name: Install Zinga Backend deps
        working-directory: zinga/Backend
        run: npm install --no-fund --no-audit

      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run test:component
      - run: npm run test:integration

      - name: Report status back to Zinga PR
        if: always() && github.event_name == 'repository_dispatch'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ZINGA_STATUS_TOKEN }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: 'bara080',
              repo: 'Zinga',
              sha: '${{ github.event.client_payload.zinga_sha }}',
              state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
              context: 'zingaTest/unit-component-integration',
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
            });

  e2e-ios:
    runs-on: macos-14
    needs: unit-component-integration
    if: github.event_name == 'repository_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.ZINGA_DEPLOY_KEY }}

      - name: Pin Zinga submodule
        if: github.event_name == 'repository_dispatch'
        run: cd zinga && git fetch origin ${{ github.event.client_payload.zinga_sha }} && git checkout ${{ github.event.client_payload.zinga_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install
      - working-directory: zinga/Frontend
        run: npm install

      # Detox build — prebuild the iOS project from the submodule, then build the test target.
      - working-directory: zinga/Frontend
        run: npx expo prebuild --platform ios --no-install
      - run: npm run detox:build:ios
      - run: npm run detox:test:ios

      - name: Report E2E iOS status
        if: always() && github.event_name == 'repository_dispatch'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ZINGA_STATUS_TOKEN }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: 'bara080',
              repo: 'Zinga',
              sha: '${{ github.event.client_payload.zinga_sha }}',
              state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
              context: 'zingaTest/e2e-ios',
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
            });

  e2e-android:
    runs-on: ubuntu-latest
    needs: unit-component-integration
    if: github.event_name == 'repository_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.ZINGA_DEPLOY_KEY }}

      - name: Pin Zinga submodule
        if: github.event_name == 'repository_dispatch'
        run: cd zinga && git fetch origin ${{ github.event.client_payload.zinga_sha }} && git checkout ${{ github.event.client_payload.zinga_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - run: npm install
      - working-directory: zinga/Frontend
        run: npm install

      - working-directory: zinga/Frontend
        run: npx expo prebuild --platform android --no-install
      - run: npm run detox:build:android
      - run: npm run detox:test:android

      - name: Report E2E Android status
        if: always() && github.event_name == 'repository_dispatch'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ZINGA_STATUS_TOKEN }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: 'bara080',
              repo: 'Zinga',
              sha: '${{ github.event.client_payload.zinga_sha }}',
              state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
              context: 'zingaTest/e2e-android',
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
            });
